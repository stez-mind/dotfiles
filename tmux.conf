set -sg escape-time 1

set -g mode-keys vi
set -g history-limit 100000
set -g allow-rename off

# True color support — use tmux-256color if available, fall back to screen-256color
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
set -ga terminal-overrides ",*256col*:Tc"

# ── Pane splitting ────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim keys) ───────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Mouse ─────────────────────────────────────────────────────────
set -g mouse on
set -s set-clipboard off

# ── Copy mode (vi style, cross-platform clipboard) ───────────────
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell 'command -v pbcopy >/dev/null' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"'

# ── Status bar (Tokyo Night) ─────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour146"

# Left: session name with powerline separator
set -g status-left-length 30
set -g status-left "#[fg=colour234,bg=colour111,bold] #S #[fg=colour111,bg=colour235,nobold]"

# Right: gitmux + time + date with powerline separators
set -g status-right-length 80
set -g status-right "#(gitmux -cfg ~/.gitmux.conf '#{pane_current_path}') #[fg=colour236,bg=colour235]#[fg=colour146,bg=colour236] %H:%M #[fg=colour111,bg=colour236]#[fg=colour234,bg=colour111,bold] %d-%b "

# Window tabs with powerline separators
set -g window-status-format "#[fg=colour235,bg=colour236]#[fg=colour60,bg=colour236] #I:#W #[fg=colour236,bg=colour235]"
set -g window-status-current-format "#[fg=colour235,bg=colour111]#[fg=colour234,bg=colour111,bold] #I:#W#{?window_zoomed_flag, [Z],} #[fg=colour111,bg=colour235,nobold]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=colour215,bold"
set -g monitor-activity on
set -g visual-activity off

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour60"
set -g pane-active-border-style "fg=colour111"

# ── Plugins ───────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'fcsonline/tmux-thumbs'

run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# Bootstrap TPM if not installed
if-shell '[ ! -d ~/.tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins"'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
